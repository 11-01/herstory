<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录 - 女性历史网</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{min-height:100vh;background:#f3efe9;font-family:宋体, sans-serif;display:flex;align-items:center;justify-content:center;padding:20px;}
        .login-card{width:100%;max-width:420px;background:#fff;padding:32px;border-radius:18px;box-shadow:0 20px 50px rgba(0,0,0,0.1);}
        h2{font-size:26px;color:#9c6c46;text-align:center;margin-bottom:20px;}
        .field{margin-bottom:18px;}
        .field label{display:block;color:#6b4a37;font-size:14px;margin-bottom:8px;}
        .field input{width:100%;padding:12px 14px;border:1px solid #e0d3c4;border-radius:10px;font-size:15px;}
        .btn{width:100%;padding:14px;background:#9c6c46;color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer;transition:0.2s;}
        .btn:hover{background:#7f5134;}
        .hint{margin-top:16px;font-size:13px;color:#8a6d57;line-height:1.6;}
        .error{margin-top:12px;color:#c0392b;font-size:14px;text-align:center;}
        .footer{margin-top:20px;text-align:center;color:#999;font-size:13px;}
        .footer a{color:#9c6c46;text-decoration:none;}
    </style>
        <script src="frontend/config.js"></script>
</head>
<body>
    <div class="login-card">
        <h2>后台管理员登录</h2>
        <div class="field">
            <label for="username">用户名</label>
            <input id="username" type="text" placeholder="输入用户名" autocomplete="username">
        </div>
        <div class="field">
            <label for="password">密码</label>
            <input id="password" type="password" placeholder="输入密码" autocomplete="current-password">
        </div>
        <button class="btn" onclick="login()">登录后台</button>
        <div class="error" id="errorMsg"></div>
        <div class="hint">默认账号：<strong>admin</strong>，默认密码：<strong>admin123</strong></div>
        <div class="footer"><a href="index.html">返回网站首页</a></div>
    </div>
<script>
    const API_BASE = window.API_BASE;
async function login(){
    let username = document.getElementById('username').value.trim();
    let password = document.getElementById('password').value.trim();
    let error = document.getElementById('errorMsg');
    error.innerText = '';
    if(!username || !password){
        error.innerText = '用户名和密码不能为空';
        return;
    }
    try{
        let resp = await fetch(`${API_BASE}/api/auth/login`, {
            method:'POST',
            credentials:'include',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({username, password})
        });
        let data = await resp.json();
        if(!resp.ok){
            error.innerText = data.error || '登录失败';
            return;
        }
        window.location.href = 'admin.html';
    } catch(e){
        error.innerText = '网络错误，请稍后再试';
        console.error(e);
    }
}
</script>
</body>
</html>
